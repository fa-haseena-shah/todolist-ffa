<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List * Five Feet Apart</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="character will">
        <img src="assets/will.png" alt="Will" style="height: 275px; width: auto;">
    </div>
    
    <div class="task-section">
        <header>
            <h1>To-Do *</h1>
            <h1 id="date"></h1>
        </header>
        <div class="all-tasks">
            <div class="lines"></div>
            <input type="text" class="input-item" id="taskInput" placeholder="Add task...">
            <ol id="taskList">
            </ol>
        </div>
    </div>

     <div class="character stella">
        <img src="assets/stella.png" alt="Stella" style="height: 260px; width: auto;">
    </div>

   <div class="banner">
        <p>Inspired by Five Feet Apart ☆ Stella's love for to-do lists</p>
        <img src="assets/banner-line.png" alt="Banner Line" class="banner-line">        
    </div>
</body>
</html>
